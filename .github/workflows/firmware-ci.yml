# ============================================================
#  Firmware CI — Arduino Compilation Verification
# ============================================================
#  Compiles both ESP32 sketches (BaseLink robot + Controller
#  transmitter) using arduino-cli to catch syntax and type
#  errors before they reach hardware.
#
#  BaseLink uses the "huge_app" partition scheme (3 MB flash)
#  because the sketch + Bluetooth + ESP-NOW + AHRS libraries
#  exceed the default 1.25 MB application partition.
#
#  Compiled .bin artifacts are uploaded per run so they can
#  be inspected or manually flashed without a local toolchain.
# ============================================================

name: Firmware CI

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**'
  pull_request:
    paths:
      - 'firmware/**'

jobs:

  # ---- BaseLink (Robot Receiver) ----
  compile-baselink:
    name: Compile BaseLink Firmware
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Configure ESP32 board core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install libraries
        run: |
          arduino-cli lib install "TMCStepper"
          arduino-cli lib install "STM32duino ISM6HG256X"
          arduino-cli lib install "QMC5883LCompass"

      - name: Compile BaseLink sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32:PartitionScheme=huge_app \
            --warnings default \
            --output-dir build/BaseLink \
            firmware/BaseLink/BaseLink.ino

      - name: Upload BaseLink build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BaseLink-firmware-${{ github.sha }}
          path: |
            build/BaseLink/*.bin
            build/BaseLink/*.elf
          if-no-files-found: error

  # ---- Controller (Joystick Transmitter) ----
  compile-controller:
    name: Compile Controller Firmware
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Configure ESP32 board core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Compile Controller sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --warnings default \
            --output-dir build/Controller \
            firmware/Controller/Controller.ino

      - name: Upload Controller build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Controller-firmware-${{ github.sha }}
          path: |
            build/Controller/*.bin
            build/Controller/*.elf
          if-no-files-found: error
