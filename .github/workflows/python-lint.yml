# ============================================================
#  Python Lint — GUI Code Quality
# ============================================================
#  Runs ruff (fast Python linter) against the gui/ directory
#  to enforce style consistency and catch common bugs.
# ============================================================

name: Python Lint

on:
  push:
    branches: [main]
    paths:
      - 'gui/**'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'gui/**'
      - 'pyproject.toml'

jobs:
  lint:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check gui/ --output-format=github

      - name: Run ruff formatter check
        run: ruff format gui/ --check --diff

  syntax-check:
    name: Syntax Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile Python files (syntax check)
        run: python -m py_compile gui/robot_controller_ui.py
