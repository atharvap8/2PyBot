# ============================================================
#  Docs Check — Markdown Link Validation
# ============================================================
#  Scans all Markdown files for broken links (internal and
#  external) using lychee. Catches stale cross-references
#  and dead URLs before they confuse readers.
# ============================================================

name: Docs Check

on:
  push:
    branches: [main]
    paths:
      - '**.md'
  pull_request:
    paths:
      - '**.md'

jobs:
  link-check:
    name: Validate Markdown Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run lychee link checker
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --no-progress
            --exclude-path .github
            --exclude 'file:///*'
            '**/*.md'
          fail: true
