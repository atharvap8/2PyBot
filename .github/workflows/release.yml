# ============================================================
#  Release — Firmware Build & GitHub Release Publisher
# ============================================================
#  Triggered by a version tag (e.g. v1.0.0) pushed to main.
#  Compiles both ESP32 sketches, then creates a GitHub Release
#  and attaches all flashable assets with full release notes.
#
#  Partition schemes:
#    BaseLink   — huge_app (3 MB) for large firmware footprint
#    Controller — default  (1.25 MB) sufficient for transmitter
#
#  To cut a release:
#    git tag v1.0.0 -m "Initial release"
#    git push origin v1.0.0
# ============================================================

name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # required to create GitHub Releases

jobs:
  build-and-release:
    name: Build Firmware & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Configure ESP32 board core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install BaseLink libraries
        run: |
          arduino-cli lib install "TMCStepper"
          arduino-cli lib install "STM32duino ISM6HG256X"
          arduino-cli lib install "QMC5883LCompass"

      # ---- Compile BaseLink (Robot Receiver) ----
      - name: Compile BaseLink sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32:PartitionScheme=huge_app \
            --warnings default \
            --output-dir build/BaseLink \
            firmware/BaseLink/BaseLink.ino

      # ---- Compile Controller (Joystick Transmitter) ----
      - name: Compile Controller sketch
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --warnings default \
            --output-dir build/Controller \
            firmware/Controller/Controller.ino

      # ---- Stage release assets with descriptive names ----
      - name: Stage release assets
        run: |
          mkdir -p release
          cp build/BaseLink/BaseLink.ino.bin              release/BaseLink-${{ github.ref_name }}.bin
          cp build/BaseLink/BaseLink.ino.bootloader.bin   release/BaseLink-${{ github.ref_name }}.bootloader.bin
          cp build/BaseLink/BaseLink.ino.partitions.bin   release/BaseLink-${{ github.ref_name }}.partitions.bin
          cp build/Controller/Controller.ino.bin          release/Controller-${{ github.ref_name }}.bin

      # ---- Create GitHub Release with full release notes ----
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "2PyBot ${{ github.ref_name }}"
          body: |
            # 2PyBot — Firmware Release ${{ github.ref_name }}

            > Self-balancing wheeled robot platform built on ESP32, TMC2208 stepper drivers,
            > and a 6-DOF Mahony AHRS fusion filter. Controlled wirelessly over ESP-NOW with
            > a custom joystick transmitter. Telemetry and live PID tuning over Bluetooth serial.

            ---

            ## Release Assets

            | File | Board | Description |
            | :--- | :--- | :--- |
            | `BaseLink-${{ github.ref_name }}.bin` | Robot (BaseLink) | Main application binary |
            | `BaseLink-${{ github.ref_name }}.bootloader.bin` | Robot (BaseLink) | ESP32 bootloader |
            | `BaseLink-${{ github.ref_name }}.partitions.bin` | Robot (BaseLink) | Partition table (huge_app, 3 MB) |
            | `Controller-${{ github.ref_name }}.bin` | Transmitter (Controller) | Joystick transmitter binary |

            ---

            ## Flashing Instructions

            ### Prerequisites

            Install `esptool.py` via pip:

            ```bash
            pip install esptool
            ```

            Alternatively, use the **ESP32 Flash Download Tool** (Windows GUI) available from Espressif.

            ---

            ### BaseLink: Robot Receiver

            The BaseLink firmware is compiled with the **`huge_app` partition scheme** (3 MB application
            partition) to accommodate the combined footprint of Bluetooth Serial, ESP-NOW, Mahony AHRS,
            TMC2208 UART drivers, and the stepper ISR.

            **You must flash three files** — the bootloader, partition table, and application binary —
            at their correct offsets.

            ```bash
            esptool.py \
              --chip esp32 \
              --port /dev/ttyUSB0 \
              --baud 921600 \
              --before default_reset \
              --after hard_reset \
              write_flash \
              0x1000  BaseLink-${{ github.ref_name }}.bootloader.bin \
              0x8000  BaseLink-${{ github.ref_name }}.partitions.bin \
              0x10000 BaseLink-${{ github.ref_name }}.bin
            ```

            > **Windows users:** replace `/dev/ttyUSB0` with your COM port, e.g. `--port COM3`

            **Flash address summary:**

            | Offset | File |
            | :--- | :--- |
            | `0x1000` | Bootloader |
            | `0x8000` | Partition table |
            | `0x10000` | Application firmware |

            ---

            ### Controller: Joystick Transmitter

            The Controller firmware only requires flashing the single application binary.

            ```bash
            esptool.py \
              --chip esp32 \
              --port /dev/ttyUSB0 \
              --baud 921600 \
              --before default_reset \
              --after hard_reset \
              write_flash \
              0x10000 Controller-${{ github.ref_name }}.bin
            ```

            ---

            ### Arduino IDE Alternative

            If you prefer not to use `esptool.py`:

            1. Open `firmware/BaseLink/BaseLink.ino` in **Arduino IDE 2.x**.
            2. Under **Tools → Board**, select `ESP32 Dev Module`.
            3. Under **Tools → Partition Scheme**, select **Huge APP (3MB No OTA/1MB SPIFFS)**.
            4. Select your COM port and click **Upload**.
            5. Repeat for `firmware/Controller/Controller.ino` using the **default** partition scheme.

            ---

            ## First-Time Configuration

            ### 1. Set the Receiver MAC Address

            Before flashing the Controller, update the receiver MAC address in `firmware/Controller/Controller.ino`:

            ```cpp
            uint8_t receiverMAC[] = {0xEC, 0x62, 0x60, 0x99, 0x97, 0xE0};  // ← replace with your robot's MAC
            ```

            The robot prints its own MAC address over USB Serial at 115200 baud on boot.

            ### 2. Calibrate the Balance Angle

            After mounting the robot upright, connect via Bluetooth or USB and tune the target angle:

            ```
            T=-1.469   ← set the equilibrium angle offset (degrees)
            ```

            Adjust until the robot stands level with zero motor output.

            ### 3. Enable the Motors

            Send `E` over Bluetooth or USB Serial to enable the drive loop. Send `X` to kill immediately.

            ---

            ## Python Dashboard

            ```bash
            cd gui
            pip install pyserial customtkinter
            python robot_controller_ui.py
            ```

            Pair the robot's Bluetooth device (`Self_Balancing_Robot`) before launching.
            Select the correct COM port in the dashboard and click **Connect**.

            ---

            ## Hardware

            | Component | Qty | Notes |
            | :--- | :---: | :--- |
            | ESP32 DevKit (38-pin) | 2 | One per board |
            | TMC2208 Stepper Driver | 2 | UART mode; 1 kΩ resistor on TX line |
            | NEMA 17 Stepper Motor | 2 | 1.8° / 200 steps per revolution |
            | ISM6HG256X IMU | 1 | Custom breakout; I2C on GPIO 21/22 |
            | QMC5883L Magnetometer | 1 | Same I2C bus |
            | MP1584 Buck Converter | 1 | 12 V → 5 V regulation |
            | 3S Li-Ion Battery Pack | 1 | ~11.1 V nominal |
            | 2-Axis Analog Joystick | 1 | ADC1 pins (GPIO 34/35) |

            ---

            ## Documentation

            Full technical documentation is available in [`docs/`](../../tree/main/docs):

            - [System Architecture](../../blob/main/docs/BaseLink/System_Architecture.md)
            - [PID Theory and Math](../../blob/main/docs/BaseLink/PID_Theory_and_Math.md)
            - [Config and Tuning Guide](../../blob/main/docs/BaseLink/Config_and_Tuning_Guide.md)
            - [Program Flow & State Machine](../../blob/main/docs/BaseLink/Program_Flow_State_Machine.md)
            - [Troubleshooting Guide](../../blob/main/docs/BaseLink/Troubleshooting_Guide.md)

            ---

            *Built with Arduino ESP32 Core 3.x / IDF 5.x — compiled and verified by GitHub Actions.*
          files: |
            release/BaseLink-${{ github.ref_name }}.bin
            release/BaseLink-${{ github.ref_name }}.bootloader.bin
            release/BaseLink-${{ github.ref_name }}.partitions.bin
            release/Controller-${{ github.ref_name }}.bin
          draft: false
          prerelease: false
